<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veltora-ZA Social Sharing Image</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 1200px;
    height: 630px;
    position: relative;
    background: #0d0d0d;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Warm gold gradient mesh background */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 50%, rgba(180, 140, 60, 0.18) 0%, transparent 65%),
      radial-gradient(ellipse 60% 80% at 85% 30%, rgba(200, 160, 80, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 90%, rgba(140, 100, 40, 0.1) 0%, transparent 55%);
  }

  /* Noise texture overlay */
  .noise {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
  }

  /* Geometric decorative lines */
  .geo-lines {
    position: absolute;
    inset: 0;
  }

  .geo-lines svg {
    width: 100%;
    height: 100%;
  }

  /* Thin gold border frame */
  .frame {
    position: absolute;
    inset: 28px;
    border: 1px solid rgba(200, 165, 80, 0.3);
    pointer-events: none;
  }

  .frame::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(200, 165, 80, 0.1);
  }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 24px;
    height: 24px;
  }
  .corner.tl { top: 22px; left: 22px; border-top: 2px solid #c8a550; border-left: 2px solid #c8a550; }
  .corner.tr { top: 22px; right: 22px; border-top: 2px solid #c8a550; border-right: 2px solid #c8a550; }
  .corner.bl { bottom: 22px; left: 22px; border-bottom: 2px solid #c8a550; border-left: 2px solid #c8a550; }
  .corner.br { bottom: 22px; right: 22px; border-bottom: 2px solid #c8a550; border-right: 2px solid #c8a550; }

  /* Center content */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .eyebrow {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.5em;
    color: rgba(200, 165, 80, 0.7);
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .divider-top {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, #c8a550, transparent);
    margin-bottom: 28px;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 96px;
    letter-spacing: 0.18em;
    color: #f0e8d0;
    line-height: 1;
    text-shadow:
      0 0 80px rgba(200, 165, 80, 0.2),
      0 2px 40px rgba(0,0,0,0.5);
    margin-bottom: 6px;
  }

  .brand-suffix {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: 0.55em;
    color: #c8a550;
    text-transform: uppercase;
    margin-bottom: 32px;
    padding-left: 0.55em; /* offset for letter-spacing */
  }

  .divider-bottom {
    width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, #c8a550, transparent);
    margin-bottom: 24px;
  }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: rgba(240, 232, 208, 0.5);
    text-transform: uppercase;
  }

  /* Decorative side elements */
  .side-ornament {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.35;
  }
  .side-ornament.left { left: 70px; }
  .side-ornament.right { right: 70px; }

  .ornament-line {
    width: 1px;
    height: 80px;
    background: linear-gradient(to bottom, transparent, #c8a550, transparent);
  }
  .ornament-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #c8a550;
  }
</style>
</head>
<body>
<div class="card">
  <!-- Background layers -->
  <div class="bg-gradient"></div>
  <div class="noise"></div>

  <!-- Geometric SVG lines -->
  <div class="geo-lines">
    <svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
      <!-- Subtle diagonal lines -->
      <line x1="0" y1="630" x2="300" y2="0" stroke="rgba(200,165,80,0.04)" stroke-width="1"/>
      <line x1="900" y1="630" x2="1200" y2="0" stroke="rgba(200,165,80,0.04)" stroke-width="1"/>
      <!-- Soft arcs -->
      <ellipse cx="600" cy="315" rx="420" ry="220" fill="none" stroke="rgba(200,165,80,0.05)" stroke-width="1"/>
      <ellipse cx="600" cy="315" rx="530" ry="280" fill="none" stroke="rgba(200,165,80,0.03)" stroke-width="1"/>
    </svg>
  </div>

  <!-- Frame -->
  <div class="frame"></div>

  <!-- Corners -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Side ornaments -->
  <div class="side-ornament left">
    <div class="ornament-line"></div>
    <div class="ornament-dot"></div>
    <div class="ornament-line"></div>
  </div>
  <div class="side-ornament right">
    <div class="ornament-line"></div>
    <div class="ornament-dot"></div>
    <div class="ornament-line"></div>
  </div>

  <!-- Main content -->
  <div class="content">
    <div class="eyebrow">Home &amp; Lifestyle</div>
    <div class="divider-top"></div>
    <div class="brand-name">Veltora</div>
    <div class="brand-suffix">ZA</div>
    <div class="divider-bottom"></div>
    <div class="tagline">Curated for extraordinary living</div>
  </div>
</div>
</body>
</html>
